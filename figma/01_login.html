<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — Hệ thống Quản lý Đào tạo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* ── Page ── */
.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background-color:#0f172a;
  background-image:radial-gradient(ellipse at top,#334155,transparent),radial-gradient(ellipse at bottom,#0f172a,transparent);
}
.login-bg{
  position:absolute;inset:0;pointer-events:none;
  background-size:40px 40px;
  background-image:linear-gradient(to right,rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.02) 1px,transparent 1px);
  mask-image:radial-gradient(circle at center,black,transparent 80%);
  -webkit-mask-image:radial-gradient(circle at center,black,transparent 80%);
}
.login-card{
  position:relative;z-index:1;width:420px;max-width:92vw;
  background:#1e293b;border:1px solid rgba(71,85,105,.4);
  border-radius:1rem;padding:2.5rem;
  box-shadow:0 25px 50px -12px rgba(0,0,0,.5);
  display:flex;flex-direction:column;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:#6264a7;border-radius:1rem 1rem 0 0;
}
.login-header{text-align:center;margin-bottom:2rem}
.login-logo{
  display:inline-flex;align-items:center;justify-content:center;
  width:48px;height:48px;border-radius:.75rem;
  background:#334155;border:1px solid rgba(51,65,85,.6);
  font-size:1.5rem;color:#6264a7;margin-bottom:1rem;
}
.login-title{font-size:1.25rem;font-weight:600;color:#f1f5f9;letter-spacing:-.02em}
.login-form{display:flex;flex-direction:column;gap:1.25rem}
.input-group{display:flex;flex-direction:column;gap:.5rem}
.input-group label{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;font-weight:600}
.input{
  width:100%;padding:.75rem 1rem;
  background:rgba(15,23,42,.6);border:1px solid rgba(51,65,85,.6);
  border-radius:.5rem;color:#f1f5f9;font-size:.875rem;
  font-family:'Inter',sans-serif;outline:none;transition:all .25s;
}
.input::placeholder{color:#64748b}
.input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1),0 0 20px rgba(99,102,241,.15)}
.password-wrapper{position:relative}
.password-wrapper .input{padding-right:44px;font-family:monospace}
.password-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#64748b;cursor:pointer;font-size:1.2rem;
  display:flex;align-items:center;padding:4px;
}
.login-submit{
  width:100%;margin-top:.5rem;padding:.75rem 1.5rem;
  font-size:.875rem;font-weight:600;
  background:#6264a7;color:white;border:none;border-radius:.5rem;
  cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif;
}
.login-submit:hover{background:#4f46e5}
.login-footer{text-align:center;margin-top:2rem;padding-top:1rem;border-top:1px dashed rgba(71,85,105,.4)}
.login-footer p{font-size:11px;color:#64748b;font-family:monospace}
</style>
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🎓</div>
      <h1 class="login-title">Hệ thống Quản lý Đào tạo</h1>
    </div>
    <form class="login-form" onsubmit="return false">
      <div class="input-group">
        <label>Tên đăng nhập</label>
        <input class="input" type="text" placeholder="Nhập tên đăng nhập..." value="admin">
      </div>
      <div class="input-group">
        <label>Mật khẩu</label>
        <div class="password-wrapper">
          <input class="input" type="password" placeholder="Nhập mật khẩu..." value="••••••••">
          <button type="button" class="password-toggle">👁</button>
        </div>
      </div>
      <button type="submit" class="login-submit">Đăng nhập</button>
    </form>
    <div class="login-footer">
      <p>© 2025 TN Education Platform</p>
    </div>
  </div>
</div>
</body>
</html>
