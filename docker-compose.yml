      dockerfile: Dockerfile
    container_name: tn-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_URL: mysql+pymysql://avnadmin:AVNS_-vnJo-A0P1uiv8792GE@mysql-220ea89f-thomson-04cc.j.aivencloud.com:12618/defaultdb
      MYSQL_SSL: "True"
      MYSQL_SSL_CA: /app/certs/ca.pem
      MONGO_URL: mongodb+srv://phattran2662002_db_user:123@cluster0.getdpyg.mongodb.net/
      MONGO_DB_NAME: tn_db
      GOOGLE_DRIVE_CREDENTIALS_FILE: /app/credentials/credentials.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
